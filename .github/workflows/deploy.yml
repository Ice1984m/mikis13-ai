name: Mikis13 AI automatisch publiceren

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mikis13-ai-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Publiceren naar Cloudflare
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"

      - run: node --version && npm --version

      - run: npm install --include=optional --no-audit --no-fund

      - run: npx --yes wrangler@latest --version

      - run: node --check worker.js

      - name: Check wrangler.toml
        run: |
          test -f wrangler.toml || { echo "::error::wrangler.toml ontbreekt"; exit 1; }
          echo "wrangler.toml gevonden"

      - name: Check secrets aanwezig
        run: |
          [ -n "$CLOUDFLARE_API_TOKEN" ] || { echo "::error::CLOUDFLARE_API_TOKEN ontbreekt"; exit 1; }
          [ -n "$CLOUDFLARE_ACCOUNT_ID" ] || { echo "::error::CLOUDFLARE_ACCOUNT_ID ontbreekt"; exit 1; }

      - name: Deploy worker
        run: npx --yes wrangler@latest deploy --config wrangler.toml

      - name: Set OPENAI_API_KEY secret in Worker
        if: ${{ env.OPENAI_API_KEY != '' }}
        run: printf '%s' "$OPENAI_API_KEY" | npx --yes wrangler@latest secret put OPENAI_API_KEY

      - name: OPENAI_API_KEY ontbreekt
        if: ${{ env.OPENAI_API_KEY == '' }}
        run: echo "OPENAI_API_KEY niet gezet; deploy ging wel door."
