name: Mikis13 AI installeren en publiceren

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mikis13-ai-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Installeren en optioneel publiceren
    runs-on: ubuntu-latest

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Repository ophalen
        uses: actions/checkout@v4

      - name: Node.js installeren
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Pakketten installeren
        run: npm install

      - name: Installatie controleren
        run: |
          echo "Project is geïnstalleerd."

          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OpenAI-sleutel ontbreekt. AI wordt later geactiveerd."
          else
            echo "OpenAI-sleutel is aanwezig."
          fi

          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "Cloudflare-gegevens ontbreken. Publiceren wordt overgeslagen."
          else
            echo "Cloudflare-gegevens zijn aanwezig."
          fi

      - name: OpenAI-secret opslaan
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' && env.OPENAI_API_KEY != '' }}
        run: |
          printf '%s' "$OPENAI_API_KEY" |
            npx wrangler secret put OPENAI_API_KEY

      - name: Worker publiceren
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' }}
        run: npx wrangler deploy

      - name: Publicatie voorlopig overslaan
        if: ${{ env.CLOUDFLARE_API_TOKEN == '' || env.CLOUDFLARE_ACCOUNT_ID == '' }}
        run: |
          echo "Installatie geslaagd."
          echo "Voeg later de Cloudflare-secrets toe om online te publiceren."
