name: Mikis13 AI automatisch publiceren

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mikis13-ai-cloudflare
  cancel-in-progress: true

jobs:
  deploy:
    name: Cloudflare publiceren
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Repository ophalen
        uses: actions/checkout@v5

      - name: Node.js installeren
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Secrets controleren
        shell: bash
        run: |
          set -Eeuo pipefail

          fout=0

          for naam in \
            CLOUDFLARE_API_TOKEN \
            CLOUDFLARE_ACCOUNT_ID \
            OPENAI_API_KEY
          do
            if [ -z "${!naam:-}" ]; then
              echo "::error::$naam ontbreekt"
              fout=1
            else
              echo "$naam is ingesteld"
            fi
          done

          [ "$fout" -eq 0 ]

      - name: Project controleren
        shell: bash
        run: |
          set -Eeuo pipefail

          test -f package.json || {
            echo "::error::package.json ontbreekt"
            exit 1
          }

          test -f wrangler.toml || {
            echo "::error::wrangler.toml ontbreekt"
            exit 1
          }

          if [ -f worker.js ]; then
            node --check worker.js
          elif [ -f src/worker.js ]; then
            node --check src/worker.js
          else
            echo "::error::Geen worker.js gevonden"
            exit 1
          fi

      - name: Pakketten installeren
        shell: bash
        run: |
          set -Eeuo pipefail

          if [ -f package-lock.json ]; then
            npm ci --include=optional --no-audit --no-fund
          else
            npm install --include=optional --no-audit --no-fund
          fi

      - name: OpenAI-secret in Cloudflare instellen
        shell: bash
        run: |
          set -Eeuo pipefail

          for poging in 1 2 3; do
            echo "Secret-poging $poging van 3"

            if printf '%s' "$OPENAI_API_KEY" |
              npx --yes wrangler@latest secret put OPENAI_API_KEY \
                --config wrangler.toml
            then
              echo "OpenAI-secret ingesteld"
              exit 0
            fi

            if [ "$poging" -lt 3 ]; then
              sleep $((poging * 15))
            fi
          done

          echo "::error::OpenAI-secret instellen mislukt"
          exit 1

      - name: Cloudflare publiceren
        shell: bash
        run: |
          set -Eeuo pipefail

          for poging in 1 2 3; do
            echo "Deploy-poging $poging van 3"

            if npx --yes wrangler@latest deploy \
              --config wrangler.toml
            then
              echo "Cloudflare-deploy geslaagd"
              exit 0
            fi

            if [ "$poging" -lt 3 ]; then
              sleep $((poging * 20))
            fi
          done

          echo "::error::Cloudflare-deploy mislukt"
          exit 1

      - name: Website controleren
        shell: bash
        run: |
          set -Eeuo pipefail

          URL="https://mikis13-ai.ice1984m.workers.dev"

          for poging in $(seq 1 20); do
            code="$(
              curl \
                --location \
                --silent \
                --show-error \
                --output /tmp/site \
                --write-out '%{http_code}' \
                "$URL/" || true
            )"

            echo "Controle $poging/20: HTTP $code"

            if [ "$code" = "200" ]; then
              echo "Website is online"
              exit 0
            fi

            sleep 15
          done

          echo "::error::Website niet bereikbaar"
          exit 1
