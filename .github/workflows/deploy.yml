name: Mikis13 AI online en offline publiceren

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - "worker.js"
      - "wrangler.toml"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy.yml"

permissions:
  contents: read

concurrency:
  group: mikis13-ai-cloudflare
  cancel-in-progress: true

jobs:
  controleren:
    name: Broncode en configuratie controleren
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Repository ophalen
        uses: actions/checkout@v6

      - name: Node.js installeren
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Bestanden controleren
        shell: bash
        run: |
          set -Eeuo pipefail

          test -f worker.js
          test -f wrangler.toml
          test -f package.json

          node --check worker.js

          grep -q \
            'type: "web_search"' \
            worker.js

          grep -q \
            "offlineFallback" \
            worker.js

      - name: Dependencies installeren
        shell: bash
        run: |
          set -Eeuo pipefail

          if [ -f package-lock.json ]; then
            npm ci \
              --include=optional \
              --no-audit \
              --no-fund
          else
            npm install \
              --include=optional \
              --no-audit \
              --no-fund
          fi

      - name: Wrangler-configuratie controleren
        shell: bash
        run: |
          set -Eeuo pipefail

          npx --yes wrangler@latest deploy \
            --dry-run \
            --config wrangler.toml

  deploy:
    name: Cloudflare publiceren en testen
    needs: controleren
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    env:
      CLOUDFLARE_API_TOKEN:
        ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID:
        ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      OPENAI_API_KEY:
        ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Repository ophalen
        uses: actions/checkout@v6

      - name: Node.js installeren
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Cloudflare-secrets controleren
        shell: bash
        run: |
          set -Eeuo pipefail

          test -n "$CLOUDFLARE_API_TOKEN" || {
            echo "::error::CLOUDFLARE_API_TOKEN ontbreekt"
            exit 1
          }

          test -n "$CLOUDFLARE_ACCOUNT_ID" || {
            echo "::error::CLOUDFLARE_ACCOUNT_ID ontbreekt"
            exit 1
          }

          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::warning::OPENAI_API_KEY ontbreekt"
            echo "Worker wordt in offline reservemodus gepubliceerd."
          fi

      - name: OpenAI-secret instellen
        if: ${{ env.OPENAI_API_KEY != '' }}
        shell: bash
        run: |
          set -Eeuo pipefail

          for poging in 1 2 3; do
            if printf '%s' "$OPENAI_API_KEY" |
              npx --yes wrangler@latest \
                secret put OPENAI_API_KEY \
                --config wrangler.toml
            then
              exit 0
            fi

            sleep $((poging * 10))
          done

          exit 1

      - name: Worker publiceren
        shell: bash
        run: |
          set -Eeuo pipefail

          for poging in 1 2 3; do
            if npx --yes wrangler@latest deploy \
              --config wrangler.toml
            then
              exit 0
            fi

            sleep $((poging * 15))
          done

          exit 1

      - name: Worker-status zoeken
        shell: bash
        run: |
          set -Eeuo pipefail

          UITVOER="$(
            npx --yes wrangler@latest deployments list \
              --config wrangler.toml \
              2>&1 || true
          )"

          echo "$UITVOER"

          echo "Deploy uitgevoerd."
          echo "Controleer /api/status op de workers.dev-URL."
