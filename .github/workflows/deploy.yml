name: Mikis13 AI automatisch publiceren

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mikis13-ai-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Publiceren naar Cloudflare
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_AI_API_TOKEN: ${{ secrets.CLOUDFLARE_AI_API_TOKEN }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Repository ophalen
        uses: actions/checkout@v4

      - name: Node.js installeren
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Pakketten installeren
        run: npm install --no-audit --no-fund

      - name: Wrangler-versie controleren
        run: npx wrangler --version --no-audit --no-fund

      - name: Wrangler-versie controleren
        run: echo "Wrangler draait uitsluitend in GitHub Actions." --no-audit --no-fund

      - name: Wrangler-versie controleren
        run: echo "Wrangler draait uitsluitend in GitHub Actions." --no-audit --no-fund

      - name: Wrangler-versie controleren
        run: echo "Wrangler draait uitsluitend in GitHub Actions." --no-audit --no-fund

      - name: Wrangler-versie controleren
        run: echo "Wrangler draait uitsluitend in GitHub Actions." --no-audit --no-fund

      - name: Wrangler-versie controleren
        run: echo "Wrangler draait uitsluitend in GitHub Actions."

      - name: JavaScript controleren
        run: npm run check

      - name: Verplichte Cloudflare-secrets controleren
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || {
            echo "::error::CLOUDFLARE_API_TOKEN ontbreekt."
            exit 1
          }

          test -n "$CLOUDFLARE_ACCOUNT_ID" || {
            echo "::error::CLOUDFLARE_ACCOUNT_ID ontbreekt."
            exit 1
          }

      - name: Worker eerst publiceren
        run: npx wrangler deploy

      - name: OpenAI-secret opslaan
        if: ${{ env.OPENAI_API_KEY != '' }}
        run: |
          printf '%s' "$OPENAI_API_KEY" |
            npx wrangler secret put OPENAI_API_KEY

      - name: Zonder OpenAI-key afronden
        if: ${{ env.OPENAI_API_KEY == '' }}
        run: |
          echo "Worker is online."
          echo "OPENAI_API_KEY kan later worden toegevoegd."
