name: Mikis13 AI Android APK

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - "android-app/**"
      - ".github/workflows/android-apk.yml"

permissions:
  contents: read

concurrency:
  group: mikis13-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: APK volledig testen en bouwen
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Repository ophalen
        uses: actions/checkout@v6

      - name: Projectstructuur controleren
        shell: bash
        run: |
          set -Eeuo pipefail

          test -f android-app/settings.gradle
          test -f android-app/build.gradle
          test -f android-app/app/build.gradle
          test -f android-app/app/src/main/AndroidManifest.xml
          test -f android-app/app/src/main/java/com/mikis13/ai/MainActivity.java

          grep -q \
            'applicationId "com.mikis13.ai"' \
            android-app/app/build.gradle

          grep -q \
            "android.permission.INTERNET" \
            android-app/app/src/main/AndroidManifest.xml

          if grep -RInE \
            '^(<<<<<<<|=======|>>>>>>>)' \
            android-app
          then
            echo "::error::Git-conflictmarkeringen gevonden"
            exit 1
          fi

      - name: Java 17 installeren
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Gradle installeren
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.10.2"
          cache-disabled: true

      - name: Gradle-configuratie controleren
        working-directory: android-app
        shell: bash
        run: |
          set -Eeuo pipefail

          gradle --version

          gradle \
            --no-daemon \
            --stacktrace \
            tasks \
            >/dev/null

      - name: Android lint uitvoeren
        working-directory: android-app
        shell: bash
        run: |
          set -Eeuo pipefail

          gradle \
            --no-daemon \
            --stacktrace \
            :app:lintDebug

      - name: Android unit tests uitvoeren
        working-directory: android-app
        shell: bash
        run: |
          set -Eeuo pipefail

          if gradle tasks --all |
             grep -q "testDebugUnitTest"
          then
            gradle \
              --no-daemon \
              --stacktrace \
              :app:testDebugUnitTest
          else
            echo "Geen unit-testtaak aanwezig."
          fi

      - name: Debug-APK bouwen
        working-directory: android-app
        shell: bash
        run: |
          set -Eeuo pipefail

          gradle \
            --no-daemon \
            --stacktrace \
            :app:assembleDebug

      - name: APK zoeken en valideren
        shell: bash
        run: |
          set -Eeuo pipefail

          APK="$(
            find android-app/app/build/outputs/apk \
              -type f \
              -name "*.apk" \
              | sort \
              | tail -n 1
          )"

          test -n "$APK"
          test -f "$APK"

          SIZE="$(stat -c%s "$APK")"

          if [ "$SIZE" -lt 4096 ]; then
            echo "::error::APK is te klein: $SIZE bytes"
            exit 1
          fi

          unzip -t "$APK"

          SDK="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-}}"

          if [ -n "$SDK" ]; then
            APKSIGNER="$(
              find "$SDK/build-tools" \
                -type f \
                -name apksigner \
                | sort -V \
                | tail -n 1
            )"

            if [ -n "$APKSIGNER" ] &&
               [ -x "$APKSIGNER" ]
            then
              "$APKSIGNER" verify \
                --verbose \
                --print-certs \
                "$APK"
            fi
          fi

          cp "$APK" mikis13-ai-1.1.0-debug.apk

          sha256sum mikis13-ai-1.1.0-debug.apk \
            > mikis13-ai-1.1.0-debug.apk.sha256

          echo "APK geldig: $SIZE bytes"

      - name: APK bewaren
        uses: actions/upload-artifact@v4
        with:
          name: mikis13-ai-apk
          path: |
            mikis13-ai-1.1.0-debug.apk
            mikis13-ai-1.1.0-debug.apk.sha256
          if-no-files-found: error
          retention-days: 90
          compression-level: 0

      - name: Eindresultaat
        run: |
          echo "=================================="
          echo "MIKIS13 AI APK BUILD GESLAAGD"
          echo "=================================="
