name: Mikis13 volledig testen

on:
  workflow_dispatch:
    inputs:
      uitgebreide_tests:
        description: Uitgebreide Android-tests uitvoeren
        required: false
        default: true
        type: boolean

  push:
    branches:
      - main
    paths:
      - "android-app/**"
      - "api/**"
      - "src/**"
      - "public/**"
      - "worker.js"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/mikis13.yml"

  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: mikis13-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  volledig-testen:
    name: Node controleren en APK bouwen
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Repository ophalen
        uses: actions/checkout@v6

      - name: Projectstructuur controleren
        shell: bash
        run: |
          set -Eeuo pipefail

          test -f package.json
          test -f android-app/settings.gradle
          test -f android-app/build.gradle
          test -f android-app/app/build.gradle
          test -f android-app/app/src/main/AndroidManifest.xml
          test -f android-app/app/src/main/java/com/mikis13/ai/MainActivity.java

          if grep -RInE \
            '^(<<<<<<<|=======|>>>>>>>)' \
            --exclude-dir=.git \
            --exclude-dir=node_modules \
            .
          then
            echo "::error::Git-conflictmarkeringen gevonden"
            exit 1
          fi

          if grep -RInE \
            'sk-proj-[A-Za-z0-9_-]{20,}|cfut_[A-Za-z0-9_-]{20,}|BEGIN (RSA|EC|OPENSSH) PRIVATE KEY' \
            --exclude-dir=.git \
            --exclude-dir=node_modules \
            --exclude=package-lock.json \
            .
          then
            echo "::error::Mogelijke geheime sleutel gevonden"
            exit 1
          fi

          echo "✅ Projectstructuur geldig"

      - name: Node.js installeren
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Node dependencies installeren
        shell: bash
        run: |
          set -Eeuo pipefail

          if [ -f package-lock.json ]; then
            npm ci \
              --include=optional \
              --no-audit \
              --no-fund
          else
            npm install \
              --include=optional \
              --no-audit \
              --no-fund
          fi

      - name: JavaScript controleren
        shell: bash
        run: |
          set -Eeuo pipefail

          node -e '
            JSON.parse(
              require("fs").readFileSync(
                "package.json",
                "utf8"
              )
            );
          '

          while IFS= read -r -d '' BESTAND; do
            echo "Controleren: $BESTAND"
            node --check "$BESTAND"
          done < <(
            find . \
              -type f \
              \( \
                -name "*.js" -o \
                -name "*.mjs" -o \
                -name "*.cjs" \
              \) \
              -not -path "./node_modules/*" \
              -not -path "./.git/*" \
              -print0
          )

          npm run check

      - name: Java 17 installeren
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Gradle 8.10.2 installeren
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.10.2"
          cache-disabled: true

      - name: Android-configuratie controleren
        working-directory: android-app
        shell: bash
        run: |
          set -Eeuo pipefail

          gradle --version
          gradle \
            --no-daemon \
            --stacktrace \
            tasks \
            >/dev/null

          grep -q \
            "compileSdk 35" \
            app/build.gradle

          grep -q \
            "targetSdk 35" \
            app/build.gradle

          grep -q \
            'applicationId "com.mikis13.ai"' \
            app/build.gradle

          grep -q \
            "android.permission.INTERNET" \
            app/src/main/AndroidManifest.xml

          grep -q \
            "package com.mikis13.ai" \
            app/src/main/java/com/mikis13/ai/MainActivity.java

          echo "✅ Android-configuratie geldig"

      - name: Android lint uitvoeren
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.uitgebreide_tests }}
        working-directory: android-app
        shell: bash
        run: |
          set -Eeuo pipefail

          gradle \
            --no-daemon \
            --stacktrace \
            :app:lintDebug

      - name: Android unit tests uitvoeren
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.uitgebreide_tests }}
        working-directory: android-app
        shell: bash
        run: |
          set -Eeuo pipefail

          gradle \
            --no-daemon \
            --stacktrace \
            :app:testDebugUnitTest

      - name: Debug-APK bouwen
        working-directory: android-app
        shell: bash
        run: |
          set -Eeuo pipefail

          gradle \
            --no-daemon \
            --stacktrace \
            :app:assembleDebug

      - name: APK valideren
        shell: bash
        run: |
          set -Eeuo pipefail

          APK="android-app/app/build/outputs/apk/debug/app-debug.apk"

          test -f "$APK" || {
            echo "::error::APK ontbreekt"
            exit 1
          }

          GROOTTE="$(stat -c%s "$APK")"

          if [ "$GROOTTE" -lt 4096 ]; then
            echo "::error::APK is beschadigd: $GROOTTE bytes"
            exit 1
          fi

          unzip -t "$APK"

          SDK="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-}}"

          test -n "$SDK"

          APKSIGNER="$(
            find "$SDK" \
              -type f \
              -name apksigner \
              | sort -V \
              | tail -n 1
          )"

          test -n "$APKSIGNER"
          chmod +x "$APKSIGNER"

          "$APKSIGNER" verify \
            --verbose \
            --print-certs \
            "$APK"

          AAPT="$(
            find "$SDK" \
              -type f \
              -name aapt \
              | sort -V \
              | tail -n 1
          )"

          if [ -n "$AAPT" ]; then
            chmod +x "$AAPT"

            "$AAPT" dump badging "$APK" |
              tee /tmp/apk-info.txt

            grep -q \
              "package: name='com.mikis13.ai'" \
              /tmp/apk-info.txt
          fi

          cp "$APK" mikis13-ai-latest.apk

          sha256sum mikis13-ai-latest.apk \
            > mikis13-ai-latest.apk.sha256

          echo "✅ APK gevalideerd: $GROOTTE bytes"

      - name: APK bewaren
        uses: actions/upload-artifact@v4
        with:
          name: mikis13-ai-apk
          path: |
            mikis13-ai-latest.apk
            mikis13-ai-latest.apk.sha256
          if-no-files-found: error
          retention-days: 90
          compression-level: 0

      - name: Eindresultaat
        shell: bash
        run: |
          echo "======================================"
          echo "✅ MIKIS13-WORKFLOW VOLLEDIG GESLAAGD"
          echo "======================================"
