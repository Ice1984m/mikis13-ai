<!doctype html><html><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Mikis13 AI</title>
<link rel="manifest" href="manifest.json" />
<style>
  body{font-family:Arial;background:#0f1117;color:#fff;padding:24px}
  .btn{display:inline-block;background:#ff0050;color:#fff;padding:12px 16px;border-radius:10px;text-decoration:none;font-weight:700;margin-right:10px;margin-bottom:10px}
  .btn-install{display:none;background:#2563eb;color:#fff;padding:12px 16px;border-radius:10px;text-decoration:none;font-weight:700;border:none;cursor:pointer}
</style>
</head><body>
<h1>Mikis13 AI</h1>
<p>AI bot staat live. Klik om te openen:</p>
<div style="margin-top:16px;">
  <a class="btn" href="/mikis13-site/bot.html">Open AI Bot</a>
  <button id="install-btn" class="btn-install">📱 Installeer App (PWA)</button>
  <a class="btn" style="background:#10b981;" href="https://github.com/Ice1984m/mikis13-ai/releases/download/latest/mikis13-ai.apk">🤖 Download APK</a>
</div>

<script>
// Register Service Worker
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  });
}

let deferredPrompt;
const installBtn = document.getElementById("install-btn");

window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;
  if (installBtn) {
    installBtn.style.display = "inline-block";
  }
});

if (installBtn) {
  installBtn.addEventListener("click", async () => {
    if (!deferredPrompt) {
      alert("Om deze app op je startscherm te installeren, tik op de 3 puntjes in de browser (of het deel-icoon op iOS) en kies 'Toevoegen aan startscherm' of 'App installeren'.");
      return;
    }
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    if (outcome === "accepted") {
      installBtn.style.display = "none";
    }
    deferredPrompt = null;
  });
}
</script>
</body></html>
