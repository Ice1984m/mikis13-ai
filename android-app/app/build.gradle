plugins {
    id "com.android.application"
}

android {
    namespace "com.mikis13.ai"
    compileSdk 35

    defaultConfig {
        applicationId "com.mikis13.ai"
        minSdk 24
        targetSdk 35
        versionCode 2
        versionName "1.1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            shrinkResources false
            proguardFiles(
                getDefaultProguardFile("proguard-android-optimize.txt"),
                "proguard-rules.pro"
            )
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
